name: Linux Builds (AppImage & DEB)

on:
  workflow_dispatch: # Allows manual triggering
  push:
    tags:
      - 'v*' # Creates a public release when you push a version tag

# Silences the Node.js 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # Added 'file' dependency which linuxdeploy relies on to inspect binaries
          sudo apt-get install -y build-essential cmake fuse libfuse2 desktop-file-utils libgl1-mesa-dev libxcb-cursor0 checkinstall file

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: 'linux'
          target: 'desktop'
          modules: 'qtimageformats'

      - name: Build Caesium
        run: |
          mkdir build && cd build
          # Pass the Qt directory using the environment variable generated by the Qt step
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_PREFIX_PATH=$Qt6_DIR ..
          make -j$(nproc)

      - name: Create AppImage
        run: |
          # Use the modern linuxdeploy toolset which actually supports Qt6 packaging
          wget -c -nv "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -c -nv "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
          chmod a+x linuxdeploy*.AppImage
          
          # Temporarily give the runner user write access to /usr/lib to bypass the Rust symlink bug
          sudo chmod 777 /usr/lib
          make -C build install DESTDIR=$(pwd)/AppDir
          sudo chmod 755 /usr/lib
          
          # Create the missing Linux directories for the AppImage
          mkdir -p AppDir/usr/share/applications/
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps/
          
          # Dynamically create the missing .desktop file
          cat <<EOF > AppDir/usr/share/applications/caesium.desktop
          [Desktop Entry]
          Type=Application
          Name=Caesium Image Compressor
          Comment=Batch image compression tool
          Exec=caesium-image-compressor %F
          Icon=caesium
          Terminal=false
          Categories=Graphics;Photography;
          EOF
          
          # Copy the real icon from the repository (with safe fallback)
          if [ -f "resources/caesium.png" ]; then
            cp resources/caesium.png AppDir/usr/share/icons/hicolor/256x256/apps/caesium.png
          elif [ -f "resources/icons/caesium.png" ]; then
            cp resources/icons/caesium.png AppDir/usr/share/icons/hicolor/256x256/apps/caesium.png
          else
            convert -size 256x256 xc:#2196F3 AppDir/usr/share/icons/hicolor/256x256/apps/caesium.png
          fi
          
          export VERSION=$(git describe --tags --always || echo "latest")
          
          # Tell linuxdeploy exactly where to find our Qt6 installation and explicitly include image plugins
          export QMAKE=$Qt6_DIR/bin/qmake
          export EXTRA_QT_PLUGINS=imageformats
          
          # Bundle everything into the final AppImage using the modern Qt plugin
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage
          
          # Find the generated AppImage and rename it cleanly (ignores the tool AppImages)
          find . -maxdepth 1 -name "Caesium_Image_Compressor*.AppImage" -exec mv {} caesium-image-compressor-linux-x86_64.AppImage \; || true

      - name: Create DEB Package
        run: |
          cd build
          export VERSION=$(git describe --tags --always || echo "1.0.0")
          
          # Try using CPack first 
          cpack -G DEB || true
          
          # If CPack didn't generate a DEB, use checkinstall as a fallback
          if ! ls *.deb 1> /dev/null 2>&1; then
            echo "Using checkinstall to generate DEB..."
            echo "Caesium Image Compressor" > description-pak
            
            # Pass PATH and HOME to sudo so Rust is still found
            sudo env "PATH=$PATH" "HOME=$HOME" checkinstall -y --pkgname=caesium-image-compressor --pkgversion=$VERSION --nodoc --maintainer="GitHub Actions" make install
          fi

      - name: Save Artifacts (For Manual Runs)
        uses: actions/upload-artifact@v4
        with:
          name: caesium-linux-builds
          path: |
            *.AppImage
            build/*.deb

      - name: Upload Release Artifacts (For Tag Pushes)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.AppImage
            build/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
