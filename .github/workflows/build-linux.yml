name: Linux Builds (AppImage & DEB)

on:
  workflow_dispatch: # Allows manual triggering
  push:
    tags:
      - 'v*' # Creates a public release when you push a version tag

# This silences the Node.js 20 deprecation warning you saw
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake fuse libfuse2 desktop-file-utils libgl1-mesa-dev libxcb-cursor0 checkinstall

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          host: 'linux'
          target: 'desktop'
          modules: 'qtimageformats'

      - name: Build Caesium
        run: |
          mkdir build && cd build
          # Using standard bash syntax ($Qt6_DIR) bypasses the linter warning
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_PREFIX_PATH=$Qt6_DIR ..
          make -j$(nproc)

      - name: Create AppImage
        run: |
          # Download linuxdeployqt tool
          wget -c -nv "https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage"
          chmod a+x linuxdeployqt-continuous-x86_64.AppImage
          
          # FIX 1: Use sudo to bypass the libcaesium absolute symlink permission bug
          sudo make -C build install DESTDIR=$(pwd)/AppDir
          
          # Fix ownership back to the runner user after using sudo
          sudo chown -R $USER:$USER AppDir
          
          # FIX 2: Create the missing Linux directories
          mkdir -p AppDir/usr/share/applications/
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps/
          
          # Dynamically create the missing .desktop file
          cat <<EOF > AppDir/usr/share/applications/caesium.desktop
          [Desktop Entry]
          Type=Application
          Name=Caesium Image Compressor
          Comment=Batch image compression tool
          Exec=caesium-image-compressor %F
          Icon=caesium
          Terminal=false
          Categories=Graphics;Photography;
          EOF
          
          # Dynamically create a placeholder logo so the AppImage builder doesn't crash
          # (It draws a blue square with the word "Caesium" in the center)
          convert -size 256x256 xc:#2196F3 -gravity center -pointsize 40 -fill white -annotate +0+0 "Caesium" AppDir/usr/share/icons/hicolor/256x256/apps/caesium.png
          
          export VERSION=$(git describe --tags --always || echo "latest")
          
          # Bundle everything into the final AppImage!
          ./linuxdeployqt-continuous-x86_64.AppImage AppDir/usr/share/applications/caesium.desktop -appimage -unsupported-allow-new-glibc
          
          # Rename to something clean
          mv Caesium*.AppImage caesium-image-compressor-linux-x86_64.AppImage || true

      - name: Create DEB Package
        run: |
          cd build
          export VERSION=$(git describe --tags --always || echo "1.0.0")
          
          cpack -G DEB || true
          
          # If CPack didn't generate a DEB, use checkinstall as a fallback
          if ! ls *.deb 1> /dev/null 2>&1; then
            echo "Using checkinstall to generate DEB..."
            
            # Provide a default description to prevent checkinstall from freezing and waiting for user input
            echo "Caesium Image Compressor" > description-pak
            
            # Run checkinstall with sudo to bypass the same symlink permission error
            sudo checkinstall -y --pkgname=caesium-image-compressor --pkgversion=$VERSION --nodoc --maintainer="GitHub Actions" make install
          fi

      - name: Save Artifacts (For Manual Runs)
        uses: actions/upload-artifact@v4
        with:
          name: caesium-linux-builds
          path: |
            *.AppImage
            build/*.deb

      - name: Upload Release Artifacts (For Tag Pushes)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.AppImage
            build/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
